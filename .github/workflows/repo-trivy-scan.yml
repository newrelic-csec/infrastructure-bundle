name: 'Build and Scan'

on:
  pull_request:

jobs:
  # JOB 1: Build the Docker image using the custom script and push it to GHCR
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-name: ${{ steps.tag-and-push.outputs.image-name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # --- Your repository's unique pre-build logic ---
      - name: Download integrations
        run: go run downloader.go

      # --- Step 1: Build the image LOCALLY using your script ---
      - name: Build local Docker image with custom script
        run: |
          DOCKER_PLATFORMS=linux/amd64 ./docker-build.sh . --load

      # --- Step 2: Manually Tag and Push the image that was just built ---
      - name: Tag and Push image to GHCR
        id: tag-and-push
        run: |
          # Define the full image name and tag for GHCR
          IMAGE_ID=ghcr.io/${{ github.repository }}:${{ github.sha }}

          # Re-tag the image that was built by your script (newrelic/infrastructure-bundle:ci)
          # with the full GHCR path and unique tag.
          docker tag newrelic/infrastructure-bundle:ci $IMAGE_ID

          # Push the newly tagged image to GHCR
          docker push $IMAGE_ID

          # Save the full image ID as an output for the next job
          echo "image-name=$IMAGE_ID" >> $GITHUB_OUTPUT


  # JOB 2: Call the reusable organization workflow (No changes to this job)
  scan:
    name: Trigger Organization Scan
    needs: build
    uses: newrelic-csec/.github/.github/workflows/required-trivy-scan.yml@main
    with:
      image-name: ${{ needs.build.outputs.image-name }}
    secrets: inherit
