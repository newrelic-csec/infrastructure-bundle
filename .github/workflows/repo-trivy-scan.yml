name: 'Repo Level Trivy Scan'

on:
  pull_request:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  # JOB 1: Build the Docker image and output its name
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-name: ${{ steps.build-image.outputs.image-name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          
      - name: Download integrations
        run: go run downloader.go

      # --- CORRECTED BUILD STEP ---
      # This step now uses your repository's own build script.
      - name: Build local Docker image
        id: build-image
        run: |
          # Use the repository's own build script, passing the required platform environment variable.
          # The '--load' flag makes the image available locally for the next job.
          DOCKER_PLATFORMS=linux/amd64 ./docker-build.sh . --load
          
          # Output the hardcoded image name from your original security file.
          # Your build script likely tags the image with this name.
          echo "image-name=newrelic/infrastructure-bundle:ci" >> $GITHUB_OUTPUT


  # JOB 2: Call the reusable organization workflow (No changes to this job)
  scan:
    name: Trigger Organization Scan
    needs: build
    uses: newrelic-csec/.github/.github/workflows/required-trivy-scan.yml@main
    with:
      image-name: ${{ needs.build.outputs.image-name }}
    secrets: inherit
