name: 'Trivy Scan'

on:
  pull_request:

jobs:
  # JOB 1: Build the Docker image AND PUSH it to the registry
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    # We need to grant permissions for the job to write to GitHub Packages (GHCR)
    permissions:
      contents: read
      packages: write

    # This section defines the outputs that this job will provide to other jobs
    outputs:
      image-name: ${{ steps.build-and-push-image.outputs.imageName }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # This step logs into GHCR using a temporary token
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      # This is the new build step. It uses a standard action to build from your Dockerfile
      # and push the image to GHCR with a unique tag.
      - name: Build and push Docker image
        id: build-and-push-image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Tags the image with a unique name for this specific commit
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          # The action automatically outputs the full image name as 'imageName'
          
  # JOB 2: Call the reusable organization workflow
  scan:
    name: Trigger Organization Scan
    # This ensures the 'scan' job will only start after the 'build' job succeeds
    needs: build
    
    # This 'uses' is now at the top level of the job
    uses: newrelic-csec/.github/.github/workflows/required-trivy-scan.yml@main
    
    with:
      # This retrieves the full image name (e.g., ghcr.io/newrelic-csec/infrastructure-bundle:sha)
      # from the 'build' job's output.
      image-name: ${{ needs.build.outputs.image-name }}
      
    secrets: inherit
